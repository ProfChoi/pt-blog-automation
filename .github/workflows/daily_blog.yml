name: Daily PT Blog

on:
  schedule:
    - cron: '30 23 * * 1,3,6'  # 매주 일,화,금 KST 08:30 (3일 주기)
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  run-blog:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 anthropic

      - name: 블로그 초안 생성 및 이메일 발송
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python fetch_and_write.py

      - name: 사용 기록 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add used_articles.txt
          git diff --staged --quiet || git commit -m "Update used articles"
          git push
